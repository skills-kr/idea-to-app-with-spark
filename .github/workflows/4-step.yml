name: Step 4 # 앱 공유

on:
  issue_comment:
    types:
      - edited

concurrency: step-4

permissions:
  contents: read
  actions: write
  issues: write

env:
  STEP_5_FILE: ".github/steps/5-step.md"

jobs:
  find_exercise:
    name: 실습 이슈 찾기
    uses: skills-kr/exercise-toolkit/.github/workflows/find-exercise-issue.yml@kr-v0.6.0

  check_step:
    name: 단계 확인
    runs-on: ubuntu-latest

    outputs:
      is-step-complete: ${{ steps.is-step-complete.outputs.is-step-complete }}

    steps:
      - name: 댓글 본문에 단계 번호와 체크된 박스가 포함되어 있는지 확인
        uses: actions/github-script@v6
        id: is-step-complete
        with:
          script: |
            // Get comment body
            const commentBody = process.env.COMMENT_BODY || '';

            // Check for Step number and checked box
            const stepNumberFound = commentBody.includes(process.env.STEP_MARKER);
            const checkboxCheckFound = commentBody.includes('- [x]');

            // Save result as output
            const isStepComplete = stepNumberFound && checkboxCheckFound;
            core.setOutput('is-step-complete', isStepComplete);
        env:
          STEP_MARKER: "Step 4"
          COMMENT_BODY: ${{ github.event.comment.body }}

  post_next_step_content:
    name: 다음 단계 내용 게시
    needs: [find_exercise, check_step]
    runs-on: ubuntu-latest
    if: ${{ needs.check_step.outputs.is-step-complete == 'true' }}

    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 응답 템플릿 가져오기
        uses: actions/checkout@v4
        with:
          repository: skills-kr/exercise-toolkit
          path: exercise-toolkit
          ref: kr-v0.6.0

      - name: 댓글 생성 - 단계 완료
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/step-finished-prepare-next-step.md
          vars: |
            next_step_number: 5

      - name: 댓글 생성 - 단계 내용 추가
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ${{ env.STEP_5_FILE }}

      - name: 댓글 생성 - 진행 상황 확인 중
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/watching-for-progress.md

      - name: 현재 워크플로우 비활성화 및 다음 워크플로우 활성화
        run: |
          gh workflow disable "${{github.workflow}}"
          gh workflow enable "Step 5"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Workshop Tracker에 단계 보고
        if: success()
        continue-on-error: true
        run: |
          SESSION_ID=$(jq -r '.sessionId' .github/workshop-config.json)
          TRACK=$(jq -r '.track' .github/workshop-config.json)
          API_URL=$(jq -r '.apiUrl' .github/workshop-config.json)
          curl -s -X POST "$API_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "sessionId": "'"$SESSION_ID"'",
              "type": "step",
              "step": 4,
              "description": "앱 공유",
              "username": "'"$GITHUB_ACTOR"'",
              "repo": "'"$GITHUB_REPOSITORY"'",
              "track": "'"$TRACK"'",
              "runId": "'"$GITHUB_RUN_ID"'"
            }' || true
